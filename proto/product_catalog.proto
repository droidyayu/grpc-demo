syntax = "proto3";

package catalog;

option java_package         = "com.demo.grpc.generated";
option java_outer_classname = "ProductCatalogProto";
option java_multiple_files  = true;

// ─────────────────────────────────────────────
// MESSAGES
// ─────────────────────────────────────────────

message Product {
  string id          = 1;
  string name        = 2;
  int64  price_paise = 3;   // store in smallest unit (paise / cents)
  string image_url   = 4;
  bool   in_stock    = 5;
  string category    = 6;
}

message GetProductRequest {
  string product_id = 1;
}

message ListProductsRequest {
  string category = 1;   // empty = all categories
  int32  page     = 2;
  int32  page_size = 3;
}

message WatchPriceRequest {
  string product_id = 1;
}

message PriceUpdate {
  string product_id  = 1;
  int64  price_paise = 2;
  string currency    = 3;
}

message Empty {}

// ─────────────────────────────────────────────
// SERVICE
// ─────────────────────────────────────────────

service CatalogService {
  // Unary RPC — fetch one product
  rpc GetProduct (GetProductRequest)  returns (Product);

  // Server-streaming RPC — stream a list page by page
  rpc ListProducts (ListProductsRequest) returns (stream Product);

  // Server-streaming RPC — live price updates (demo for streaming slide)
  rpc WatchPrice (WatchPriceRequest) returns (stream PriceUpdate);
}
