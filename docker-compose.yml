services:
  backend:
    build:
      context: .          # repo root — so both proto/ and backend/ are in scope
      dockerfile: Dockerfile
    image: grpc-demo-backend:latest
    container_name: grpc-demo-backend
    restart: unless-stopped
    ports:
      - "50051:50051"   # gRPC
      - "8080:8080"     # REST / health
    environment:
      - JAVA_OPTS=-Xmx256m
    healthcheck:
      # Hits the REST health endpoint; grpc_health_probe could be used instead
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/v1/products"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
